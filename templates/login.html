<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sistema Interno</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">  
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- ANIMAÇÃO DAS BOLHAS --- */
        .bubbles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bubbles li {
            position: absolute;
            list-style: none;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.15);
            bottom: -150px;
            animation: animate 25s linear infinite;
            border-radius: 50%;
        }

        /* Diferentes tamanhos e tempos para cada bolha */
        .bubbles li:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .bubbles li:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .bubbles li:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .bubbles li:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .bubbles li:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
        .bubbles li:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }
        .bubbles li:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; }
        .bubbles li:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; }
        .bubbles li:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; }
        .bubbles li:nth-child(10) { left: 85%; width: 150px; height: 150px; animation-delay: 0s; animation-duration: 11s; }

        @keyframes animate {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
                border-radius: 50%;
            }
            100% {
                transform: translateY(-1000px) rotate(720deg);
                opacity: 0;
                border-radius: 20%; /* Elas mudam de forma levemente ao subir */
            }
        }
        /* --------------------------- */

        .login-box {
            position: relative;
            z-index: 1; /* Garante que o form fique acima das bolhas */
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 380px;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        h2 {
            color: #1a202c;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #718096;
            font-size: 14px;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 18px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.2s ease;
            background: #f8fafc;
        }

        input:focus {
            outline: none;
            border-color: #2575fc;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(37, 117, 252, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #2575fc;
            border: none;
            color: white;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(37, 117, 252, 0.3);
        }

        button:hover {
            background: #1a5ecf;
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 25px;
            font-size: 13px;
            color: #a0aec0;
            border-top: 1px solid #edf2f7;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <ul class="bubbles">
        <li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li><li></li>
    </ul>

    <div class="login-box">
        <h2>Bem-vindo</h2>
        <p class="subtitle">Acesse sua conta institucional</p>

        <form method="POST">
            <input type="email" name="email" placeholder="E-mail institucional" required>
            <input type="text" name="matricula" placeholder="Matrícula" required>
            <button type="submit">Entrar no Sistema</button>
        </form>

        <div class="footer">
            &copy; Sistema de Gestão Interna
        </div>
    </div>

</body>
</html>
